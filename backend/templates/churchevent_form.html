{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ChurchEvent | NexusChurch{% endblock %}
{% block page_title %}{% if editing %}Edit ChurchEvent{% else %}New ChurchEvent{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Event Type</label>
        <select name="event_type">
          <option value="service" {% if record.event_type == 'service' %}selected{% endif %}>Service</option>
          <option value="bible_study" {% if record.event_type == 'bible_study' %}selected{% endif %}>Bible Study</option>
          <option value="youth_group" {% if record.event_type == 'youth_group' %}selected{% endif %}>Youth Group</option>
          <option value="community" {% if record.event_type == 'community' %}selected{% endif %}>Community</option>
          <option value="special" {% if record.event_type == 'special' %}selected{% endif %}>Special</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="text" name="time" value="{{ record.time|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location" value="{{ record.location|default:'' }}">
      </div>
      <div class="form-group">
        <label>Attendees</label>
        <input type="number" name="attendees" value="{{ record.attendees|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="upcoming" {% if record.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ChurchEvent</button>
      <a href="/churchevents/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
