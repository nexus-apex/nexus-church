{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Donation | NexusChurch{% endblock %}
{% block page_title %}{% if editing %}Edit Donation{% else %}New Donation{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Donor Name</label>
        <input type="text" name="donor_name" value="{{ record.donor_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Donation Type</label>
        <select name="donation_type">
          <option value="tithe" {% if record.donation_type == 'tithe' %}selected{% endif %}>Tithe</option>
          <option value="offering" {% if record.donation_type == 'offering' %}selected{% endif %}>Offering</option>
          <option value="building_fund" {% if record.donation_type == 'building_fund' %}selected{% endif %}>Building Fund</option>
          <option value="mission" {% if record.donation_type == 'mission' %}selected{% endif %}>Mission</option>
          <option value="special" {% if record.donation_type == 'special' %}selected{% endif %}>Special</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Method</label>
        <select name="method">
          <option value="cash" {% if record.method == 'cash' %}selected{% endif %}>Cash</option>
          <option value="card" {% if record.method == 'card' %}selected{% endif %}>Card</option>
          <option value="bank" {% if record.method == 'bank' %}selected{% endif %}>Bank</option>
          <option value="online" {% if record.method == 'online' %}selected{% endif %}>Online</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="received" {% if record.status == 'received' %}selected{% endif %}>Received</option>
          <option value="pledged" {% if record.status == 'pledged' %}selected{% endif %}>Pledged</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Donation</button>
      <a href="/donations/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
